# ============================================================
# AEGIS Autonomous Defense Platform — Docker Compose
# ============================================================
#
# Quick start (no .env needed — sane defaults are built in):
#   docker compose up -d
#
# Full stack (with Redis for event bus + caching):
#   docker compose --profile full up -d
#
# ENVIRONMENT VARIABLES (override in .env or shell):
#
#   POSTGRES_DB          Database name              (default: aegis)
#   POSTGRES_USER        Database user              (default: aegis)
#   POSTGRES_PASSWORD    Database password           (default: aegis_secret)
#   POSTGRES_PORT        Host port for PostgreSQL    (default: 5432)
#   REDIS_PORT           Host port for Redis         (default: 6379)
#   AEGIS_API_PORT       Host port for API           (default: 8000)
#   FRONTEND_PORT        Host port for frontend      (default: 3000)
#   NEXT_PUBLIC_API_URL  API URL the browser calls   (default: http://localhost:8000/api/v1)
#   NEXT_PUBLIC_WS_URL   WebSocket URL for live data (default: ws://localhost:8000/ws)
#   OLLAMA_BASE_URL      Ollama inference endpoint   (default: http://host.docker.internal:11434)
#   AEGIS_PLATFORM       Platform hint for backend   (default: linux)
#   OPENROUTER_API_KEY   OpenRouter key (AI features)(default: empty — AI features disabled)
#   JWT_SECRET_KEY       Secret for JWT signing      (default: auto-generated at first run)
#   AEGIS_MONGODB_URI    MongoDB Atlas connection    (default: empty — threat intel hub disabled)
#
# WINDOWS / macOS NOTES:
#   - Docker Desktop required
#   - host.docker.internal resolves to the host machine
#   - Network mode "host" is NOT supported on Docker Desktop
#   - Ensure this file uses LF line endings, not CRLF
# ============================================================

services:
  # --- PostgreSQL Database ---
  # Stores all AEGIS data: assets, vulnerabilities, incidents, clients
  aegis-db:
    image: postgres:16-alpine
    container_name: aegis-db
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      # Database credentials — change POSTGRES_PASSWORD in production!
      POSTGRES_DB: ${POSTGRES_DB:-aegis}
      POSTGRES_USER: ${POSTGRES_USER:-aegis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegis_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aegis} -d ${POSTGRES_DB:-aegis}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    networks:
      - aegis-net

  # --- Redis (event bus, caching) ---
  # Used for pub/sub events and rate limiting
  aegis-redis:
    image: redis:7-alpine
    container_name: aegis-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-backlog 128
      --save 60 1000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"
        reservations:
          memory: 64M
    networks:
      - aegis-net

  # --- Backend API ---
  # FastAPI application serving all AEGIS endpoints
  aegis-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aegis-api
    ports:
      # API accessible on host port 8000
      - "${AEGIS_API_PORT:-8000}:8000"
    environment:
      # Database connection — built from compose service name "aegis-db"
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-aegis}:${POSTGRES_PASSWORD:-aegis_secret}@aegis-db:5432/${POSTGRES_DB:-aegis}
      # Redis connection — built from compose service name "aegis-redis"
      - REDIS_URL=redis://aegis-redis:6379
      # Platform hint (linux inside container)
      - AEGIS_PLATFORM=${AEGIS_PLATFORM:-linux}
      # Ollama for local AI inference (host.docker.internal reaches host machine)
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # OpenRouter API key for cloud AI (leave empty to disable)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      # JWT configuration
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-aegis-docker-jwt-secret-change-me}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-1440}
      # MongoDB Atlas for threat intel sharing (optional)
      - AEGIS_MONGODB_URI=${AEGIS_MONGODB_URI:-}
      # Use in-memory event bus when Redis is not available
      - USE_MEMORY_BUS=${USE_MEMORY_BUS:-false}
    volumes:
      - backend_data:/app/data
      - backend_logs:/app/logs
    depends_on:
      aegis-db:
        condition: service_healthy
      aegis-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
    networks:
      - aegis-net

  # --- Frontend Dashboard ---
  # Next.js application serving the AEGIS web UI
  aegis-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the Next.js build (client-side fetch target)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}
    container_name: aegis-frontend
    ports:
      # Frontend accessible on host port 3000
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}
      - NODE_ENV=production
    depends_on:
      aegis-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    networks:
      - aegis-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_data:
    driver: local
  backend_logs:
    driver: local

networks:
  aegis-net:
    driver: bridge
    name: aegis-net
