id: credential_stuffing
name: Credential Stuffing Attack
kind: sigma
severity: high
enabled: true
tactics:
- CredentialAccess
techniques:
- T1110.004
data_sources:
- auth_log
condition:
  event_type: auth_failure
  count_threshold: 10
  time_window_seconds: 120
  group_by: source_ip
  unique_field: username
entityMappings:
- type: IP
  field: source_ip
description: Multiple failed logins with different usernames from same IP.
