id: port_scan
name: Port Scan Detected
kind: sigma
severity: medium
enabled: true
tactics:
- Discovery
techniques:
- T1046
data_sources:
- network
condition:
  event_type: connection
  count_threshold: 20
  time_window_seconds: 60
  group_by: source_ip
  unique_field: target_port
entityMappings:
- type: IP
  field: source_ip
description: Single IP probing multiple ports.
