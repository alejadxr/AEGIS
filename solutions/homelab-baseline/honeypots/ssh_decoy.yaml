type: ssh
port: 2222
banner: "SSH-2.0-OpenSSH_7.9p1 Debian-10+deb10u2"
description: >
  Lightweight SSH honeypot for homelab environments. Minimal resource usage,
  captures brute force credentials and basic attacker fingerprinting.
fake_users:
  - username: pi
    accept_any_password: false
    delay_ms: 1000
  - username: admin
    accept_any_password: false
    delay_ms: 1000
  - username: root
    accept_any_password: false
    delay_ms: 1500
breadcrumbs:
  - "Debian GNU/Linux 10"
  - "Last login: Sun Jan 12 14:30:22 2025"
capture:
  credentials: true
  commands: false
  session_recording: false
  client_fingerprint: true
rate_limit:
  max_connections_per_ip: 5
  ban_after_attempts: 10
