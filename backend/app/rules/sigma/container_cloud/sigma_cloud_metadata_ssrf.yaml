id: sigma_cloud_metadata_ssrf
name: Cloud Metadata Service SSRF
kind: sigma
severity: critical
enabled: true
tactics:
- CredentialAccess
techniques:
- T1552.005
data_sources:
- pm2
- web_log
condition:
  event_type: web_request
  count_threshold: 1
  time_window_seconds: 60
  group_by: source_ip
  filter:
    path_contains:
    - 169.254.169.254
    - metadata.google.internal
    - 100.100.100.200
entityMappings:
- type: IP
  field: source_ip
description: Request to cloud instance metadata endpoint from application.
