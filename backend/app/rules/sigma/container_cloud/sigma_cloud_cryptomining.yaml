id: sigma_cloud_cryptomining
name: Cryptomining in Container
kind: sigma
severity: high
enabled: true
tactics:
- Impact
techniques:
- T1496
data_sources:
- edr
condition:
  event_type: process_creation
  filter:
    path_contains:
    - xmrig
    - minerd
    - cpuminer
    - stratum+tcp
    - cryptonight
entityMappings:
- type: IP
  field: source_ip
description: Cryptocurrency mining process detected inside container.
