id: sigma_cloud_k8s_secret_access
name: Kubernetes Secret Accessed
kind: sigma
severity: high
enabled: true
tactics:
- CredentialAccess
techniques:
- T1552.007
data_sources:
- cloud
condition:
  event_type: cloud_api
  count_threshold: 3
  time_window_seconds: 60
  group_by: source_ip
  filter:
    path_contains:
    - /api/v1/secrets
    - get secrets
entityMappings:
- type: IP
  field: source_ip
description: Kubernetes secrets accessed from unexpected pod or user.
