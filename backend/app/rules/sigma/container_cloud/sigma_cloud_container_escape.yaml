id: sigma_cloud_container_escape
name: Container Escape Attempt
kind: sigma
severity: critical
enabled: true
tactics:
- PrivilegeEscalation
techniques:
- T1611
data_sources:
- edr
condition:
  event_type: process_creation
  filter:
    path_contains:
    - nsenter
    - chroot
    - /proc/1/root
    - /.dockerenv
entityMappings:
- type: IP
  field: source_ip
description: Process attempting to escape container sandbox.
