id: sigma_evasion_indicator_removal
name: Indicator Removal on Host
kind: sigma
severity: high
enabled: true
tactics:
- DefenseEvasion
techniques:
- T1070
data_sources:
- edr
condition:
  event_type: process_creation
  filter:
    path_contains:
    - shred
    - wipe
    - srm
    - sdelete
    - cipher /w
entityMappings:
- type: IP
  field: source_ip
description: Removal of forensic artifacts from the host system.
