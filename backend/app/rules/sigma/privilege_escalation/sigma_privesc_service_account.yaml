id: sigma_privesc_service_account
name: Service Account Privilege Abuse
kind: sigma
severity: high
enabled: true
tactics:
- DefenseEvasion
techniques:
- T1078.003
data_sources:
- edr
condition:
  event_type: process_creation
  filter:
    account_type: service
    path_contains:
    - cmd.exe
    - powershell
    - /bin/bash
entityMappings:
- type: IP
  field: source_ip
description: Service account performing actions beyond normal scope.
