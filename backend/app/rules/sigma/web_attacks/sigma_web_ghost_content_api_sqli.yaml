id: sigma_web_ghost_content_api_sqli
name: Ghost CMS Content API Blind SQLi (CVE-2026-26980)
kind: sigma
severity: critical
enabled: true
tactics:
- InitialAccess
techniques:
- T1190
data_sources:
- http_logs
condition:
  event_type: web_request
  filter:
    path_contains_all:
    - /ghost/api
    - 'slug:'
  count_threshold: 1
  time_window_seconds: 60
  group_by: source_ip
entityMappings:
- type: IP
  field: source_ip
description: Ghost CMS Content API with slug filter/order containing SQL injection payload.
