id: sigma_web_aver_ptc_cgi_rce
name: AVer PTC Camera cgi-bin RCE (CVE-2026-40624)
kind: sigma
severity: critical
enabled: true
tactics:
- InitialAccess
- Execution
techniques:
- T1190
- T1059
data_sources:
- http_logs
condition:
  event_type: web_request
  filter:
    path_contains_all:
    - cgi-bin
    - bash -i
  count_threshold: 1
  time_window_seconds: 60
  group_by: source_ip
entityMappings:
- type: IP
  field: source_ip
description: AVer PTC camera cgi-bin endpoint with reverse shell payload (bash -i).
