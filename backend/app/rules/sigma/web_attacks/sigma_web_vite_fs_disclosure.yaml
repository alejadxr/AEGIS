id: sigma_web_vite_fs_disclosure
name: Vite Dev Server @fs Arbitrary File Read (CVE-2025-30208 / CVE-2025-31486)
kind: sigma
severity: high
enabled: true
tactics:
- Collection
- Discovery
techniques:
- T1083
- T1005
data_sources:
- pm2
- web_log
condition:
  event_type: web_request
  count_threshold: 1
  time_window_seconds: 60
  group_by: source_ip
  filter:
    path_contains:
    - /@fs/
    - ?raw??
    - "?import&raw"
    - "?raw&url"
entityMappings:
- type: IP
  field: source_ip
description: >
  Vite dev server arbitrary file read via /@fs/ + double-question-mark
  raw query (CVE-2025-30208) or relative-path fs.deny bypass
  (CVE-2025-31486). Affects Vite <6.2.3. Vite dev servers MUST NOT
  be exposed to internet. Common targets: .env, credentials,
  /etc/passwd. Affects WilabIA dev deployments.
