id: sigma_web_ivanti_sentry_cmdinject
name: Ivanti Sentry MICS Unauth Command Injection (CVE-2026-10520)
kind: sigma
severity: critical
enabled: true
tactics:
- InitialAccess
- Execution
techniques:
- T1190
- T1059
data_sources:
- http_logs
condition:
  event_type: web_request
  filter:
    path_contains_all:
    - /mics/api/v2/sentry/mics-config/handleMessage
    - commandexec
  count_threshold: 1
  time_window_seconds: 60
  group_by: source_ip
entityMappings:
- type: IP
  field: source_ip
description: Ivanti Sentry MICS API handleMessage POST containing commandexec payload.
