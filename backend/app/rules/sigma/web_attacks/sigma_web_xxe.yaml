id: sigma_web_xxe
name: XML External Entity (XXE) Injection
kind: sigma
severity: critical
enabled: true
tactics:
- InitialAccess
techniques:
- T1190
data_sources:
- pm2
- web_log
condition:
  event_type: web_request
  count_threshold: 1
  time_window_seconds: 60
  group_by: source_ip
  filter:
    path_contains:
    - <!ENTITY
    - SYSTEM
    - file://
    - expect://
entityMappings:
- type: IP
  field: source_ip
description: Detects XXE injection via XML payloads with external entity definitions.
