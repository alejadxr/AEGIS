id: sigma_web_drupal_jsonapi_sqli
name: Drupal JSON:API PostgreSQL SQLi (CVE-2026-9082)
kind: sigma
severity: critical
enabled: true
tactics:
- InitialAccess
techniques:
- T1190
data_sources:
- http_logs
condition:
  event_type: web_request
  filter:
    path_contains_all:
    - /jsonapi/
    - UNION
  count_threshold: 1
  time_window_seconds: 60
  group_by: source_ip
entityMappings:
- type: IP
  field: source_ip
description: Drupal JSON:API path with SQL UNION keyword in body/params â€” entity-query SQLi.
