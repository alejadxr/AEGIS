id: sigma_web_xss_reflected
name: Reflected XSS Attempt
kind: sigma
severity: high
enabled: true
tactics:
- Execution
techniques:
- T1059.007
data_sources:
- pm2
- web_log
condition:
  event_type: web_request
  count_threshold: 1
  time_window_seconds: 60
  group_by: source_ip
  filter:
    path_contains:
    - <script
    - 'javascript:'
    - onerror=
    - onload=
    - alert(
entityMappings:
- type: IP
  field: source_ip
description: Detects reflected cross-site scripting payloads in URL parameters.
