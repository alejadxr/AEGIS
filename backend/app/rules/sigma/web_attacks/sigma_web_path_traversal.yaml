id: sigma_web_path_traversal
name: Path Traversal Attack
kind: sigma
severity: high
enabled: true
tactics:
- Discovery
techniques:
- T1083
data_sources:
- pm2
- web_log
condition:
  event_type: web_request
  count_threshold: 1
  time_window_seconds: 60
  group_by: source_ip
  filter:
    path_contains:
    - ../
    - ..\
    - '%2e%2e'
    - /etc/passwd
    - /etc/shadow
entityMappings:
- type: IP
  field: source_ip
description: Directory traversal attempt to access files outside web root.
