id: sigma_web_ssrf
name: Server-Side Request Forgery (SSRF)
kind: sigma
severity: critical
enabled: true
tactics:
- InitialAccess
techniques:
- T1190
data_sources:
- pm2
- web_log
condition:
  event_type: web_request
  count_threshold: 1
  time_window_seconds: 60
  group_by: source_ip
  filter:
    path_contains:
    - 169.254.169.254
    - localhost
    - 127.0.0.1
    - 0.0.0.0
    - metadata.google
entityMappings:
- type: IP
  field: source_ip
description: Detects SSRF attempts targeting internal resources or cloud metadata.
