id: c2_beacon
name: C2 Beacon Pattern Detected
kind: sigma
severity: critical
enabled: true
tactics:
- CommandAndControl
techniques:
- T1071
data_sources:
- network
condition:
  event_type: connection
  count_threshold: 5
  time_window_seconds: 300
  group_by: source_ip
  unique_field: destination_ip
  filter:
    direction: outbound
    target_type: external
entityMappings:
- type: IP
  field: source_ip
description: Periodic outbound connections suggesting command-and-control beaconing.
