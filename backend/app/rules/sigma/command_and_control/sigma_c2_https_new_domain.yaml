id: sigma_c2_https_new_domain
name: HTTPS C2 to Newly Registered Domain
kind: sigma
severity: high
enabled: true
tactics:
- CommandAndControl
techniques:
- T1071.001
data_sources:
- network
condition:
  event_type: connection
  filter:
    domain_age_days_lt: 30
    protocol: tls
    direction: outbound
entityMappings:
- type: IP
  field: source_ip
description: HTTPS connection to recently registered or low-reputation domain.
