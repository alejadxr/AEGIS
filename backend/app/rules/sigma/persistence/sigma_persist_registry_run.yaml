id: sigma_persist_registry_run
name: Registry Run Key Persistence
kind: sigma
severity: high
enabled: true
tactics:
- Persistence
techniques:
- T1547.001
data_sources:
- edr
condition:
  event_type: registry_modification
  filter:
    path_contains:
    - \Run
    - \RunOnce
entityMappings:
- type: IP
  field: source_ip
description: Modification of Windows registry Run key for persistence.
