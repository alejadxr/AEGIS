id: sigma_persist_launch_agent
name: macOS Launch Agent/Daemon Created
kind: sigma
severity: high
enabled: true
tactics:
- Persistence
techniques:
- T1543.001
data_sources:
- edr
condition:
  event_type: file_creation
  filter:
    path_contains:
    - /LaunchAgents/
    - /LaunchDaemons/
entityMappings:
- type: IP
  field: source_ip
description: New LaunchAgent or LaunchDaemon plist created on macOS.
