id: sigma_persist_systemd
name: Suspicious Systemd Service Created
kind: sigma
severity: high
enabled: true
tactics:
- Persistence
techniques:
- T1543.002
data_sources:
- edr
condition:
  event_type: file_modification
  filter:
    path_contains:
    - /etc/systemd/system/
    - /lib/systemd/system/
entityMappings:
- type: IP
  field: source_ip
description: New systemd service unit file created or modified.
