id: sigma_auth_impossible_travel
name: Impossible Travel - Concurrent Sessions
kind: sigma
severity: high
enabled: true
tactics:
- DefenseEvasion
techniques:
- T1078
data_sources:
- auth_log
condition:
  event_type: auth_success
  count_threshold: 2
  time_window_seconds: 300
  group_by: username
  unique_field: geo_country
entityMappings:
- type: IP
  field: source_ip
description: Same user authenticated from geographically distant locations simultaneously.
