id: sigma_auth_default_credentials
name: Default Credentials Usage
kind: sigma
severity: high
enabled: true
tactics:
- DefenseEvasion
techniques:
- T1078.001
data_sources:
- auth_log
condition:
  event_type: auth_success
  filter:
    username:
    - admin
    - root
    - test
    - guest
    - default
    - pi
    - ubuntu
entityMappings:
- type: IP
  field: source_ip
description: Login attempt using known default credentials.
