id: sigma_auth_default_credentials
name: Default Credentials Brute Force Attempt
kind: sigma
severity: medium
enabled: true
tactics:
- CredentialAccess
techniques:
- T1078.001
- T1110
data_sources:
- auth_log
condition:
  event_type: auth_failure
  filter:
    username:
    - admin
    - root
    - test
    - guest
    - default
    - oracle
    - postgres
    - redis
  count_threshold: 3
  time_window_seconds: 300
  group_by: source_ip
  cooldown_seconds: 600
entityMappings:
- type: IP
  field: source_ip
description: Three or more failed login attempts using known default credentials within 5 minutes from the same source IP. v1.6.3.5 sync with in-code BUILT_IN_RULES — was previously firing on successful 'pi'/'ubuntu' logins on cloud-init / Raspberry Pi hosts.
