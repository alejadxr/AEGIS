id: sigma_auth_password_spray
name: Password Spray Attack
kind: sigma
severity: high
enabled: true
tactics:
- CredentialAccess
techniques:
- T1110.003
data_sources:
- auth_log
condition:
  event_type: auth_failure
  count_threshold: 15
  time_window_seconds: 600
  group_by: source_ip
  unique_field: username
entityMappings:
- type: IP
  field: source_ip
description: Same password tried against many accounts from single source.
