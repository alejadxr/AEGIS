id: sigma_auth_ftp_brute
name: FTP Brute Force Detected
kind: sigma
severity: high
enabled: true
tactics:
- CredentialAccess
techniques:
- T1110.001
data_sources:
- auth_log
condition:
  event_type: auth_failure
  count_threshold: 10
  time_window_seconds: 300
  group_by: source_ip
  filter:
    service: ftp
entityMappings:
- type: IP
  field: source_ip
description: Multiple failed FTP login attempts from same source.
