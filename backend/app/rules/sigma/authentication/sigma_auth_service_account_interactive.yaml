id: sigma_auth_service_account_interactive
name: Service Account Interactive Login
kind: sigma
severity: high
enabled: true
tactics:
- DefenseEvasion
techniques:
- T1078.003
data_sources:
- auth_log
condition:
  event_type: auth_success
  filter:
    account_type: service
    logon_type: interactive
entityMappings:
- type: IP
  field: source_ip
description: Service account used for interactive login unexpectedly.
