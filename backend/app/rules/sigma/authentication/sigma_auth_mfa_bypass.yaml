id: sigma_auth_mfa_bypass
name: MFA Bypass Attempt
kind: sigma
severity: critical
enabled: true
tactics:
- CredentialAccess
techniques:
- T1556.006
data_sources:
- auth_log
condition:
  event_type: mfa_failure
  count_threshold: 5
  time_window_seconds: 300
  group_by: username
entityMappings:
- type: IP
  field: source_ip
description: Successful auth without MFA after multiple MFA failures.
