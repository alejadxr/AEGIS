id: advanced_intrusion_chain
name: Multi-stage intrusion detected
kind: chain
severity: critical
enabled: true
tactics:
- CredentialAccess
- Reconnaissance
- Discovery
techniques:
- T1046
- T1110
- T1595.002
data_sources:
- correlation
description: 'Same IP: port scan -> brute force -> honeypot interaction'
condition:
  event_type: __chain__
sequence:
- port_scan
- brute_force_ssh
- honeypot_interaction
max_window_seconds: 7200
group_by: source_ip
chain:
- sigma_rule: port_scan
  within: 3600
- sigma_rule: brute_force_ssh
  within: 1800
- event_type: honeypot_interaction
  within: 900
entityMappings:
- type: IP
  field: source_ip
