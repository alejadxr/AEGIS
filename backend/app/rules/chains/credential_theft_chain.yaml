id: credential_theft_chain
name: Credential theft chain detected
kind: chain
severity: critical
enabled: true
tactics:
- CredentialAccess
- LateralMovement
techniques:
- T1110
- T1110.004
- T1021
data_sources:
- correlation
description: 'Same IP: brute force -> credential stuffing -> lateral movement'
condition:
  event_type: __chain__
sequence:
- brute_force_ssh
- credential_stuffing
- lateral_movement
max_window_seconds: 7200
group_by: source_ip
chain:
- sigma_rule: brute_force_ssh
  within: 1800
- sigma_rule: credential_stuffing
  within: 1200
- sigma_rule: lateral_movement
  within: 600
entityMappings:
- type: IP
  field: source_ip
