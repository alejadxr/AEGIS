id: web_attack_escalation
name: Web attack escalation chain
kind: chain
severity: critical
enabled: true
tactics:
- Exfiltration
- Persistence
- InitialAccess
techniques:
- T1190
- T1505.003
- T1041
data_sources:
- correlation
description: 'Same IP: SQL injection -> web shell upload -> data exfiltration'
condition:
  event_type: __chain__
sequence:
- sql_injection_chain
- web_shell_activity
- data_exfiltration
max_window_seconds: 7200
group_by: source_ip
chain:
- sigma_rule: sql_injection_chain
  within: 3600
- sigma_rule: web_shell_activity
  within: 1800
- sigma_rule: data_exfiltration
  within: 900
entityMappings:
- type: IP
  field: source_ip
